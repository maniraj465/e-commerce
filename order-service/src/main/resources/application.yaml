spring:
  application:
    name: order-service

# MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3317/order_service
    username: root
    password: Alliswell@1
#    username: maniraj
#    password: Alliswell@1
    driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
      hibernate:
        ddl-auto: none
      show-sql: true

# Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    template:
      default-topic: order-placed
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
#      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
#      properties:
#        schema.registry.url: http://localhost:8085

# Swagger Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Product Service
        url: /aggregate/product-service/v1/api-docs
      - name: Order Service
        url: /aggregate/order-service/v1/api-docs
      - name: Inventory Service
        url: /aggregate/inventory-service/v1/api-docs
  api-docs:
    path: /v1/api-docs

# Actuator Configuration
management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        registerHealthIndicator: true
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        minimumNumberOfCalls: 5

# Retry Configuration
  retry:
    instances:
      inventory:
        max-attempts: 3
        wait-duration: 2s

  # Resilience4j TimeLimiter Configuration
  timelimiter:
    instances:
      inventory:
        timeout-duration: 3s


# Server Configuration
server:
  port: 8081

# Debug Configuration
#debug: true

# Internal Service URLs
inventory:
  service:
    url: http://localhost:8082